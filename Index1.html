<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="script.js"></script>
    <title>HNG TASK 0</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <article data-testid="test-todo-card" class="container">

        <section class="section-1">
            <h3 data-testid="test-todo-tittle" class="content-header"> to-do-list 📗🖊</h3>

            <div class="container-content">

                <p data-testid="test-todo-description" class="your-plan">your plan</p>
                <p class="your-plan-add">Add</p>
            </div>



            <div class="  section-1-write-up">

                <div class="documented-task">
                    <label data-testid="test-todo-complete-toggle">
                        <input role="checkbox" type="checkbox" data-testid="test-todo-complete-toggle">
                        finish assignment
                    </label>

                    <div class="task-date" data-testid="test-todo-description-time">
                        <div class="task-duedate">
                            <p>finish my math assignment</p>

                            <span data-testid="test-todo-due-date">2026-04-16</span>
                        </div>

                        <p data-testid="test-todo-time-remaining" class="time-remaing">3 days time</p>
                    </div>


                    <div class="priority-level">
                        <div>🔥</div>
                        <span data-testid="test-todo-priority" class="priority-high">high</span>
                    </div>

                </div>

                <p data-testid="test-todo-status" data-original='#pending' class=" test test-pending"> #pending</p>

                <div data-testid="test-todo-tags" class="tags-category test-todo-tag ">


                    <p data-testid="test-todo-tag-work" class="content-edit">Work</p>

                    <span class="content-urgent">
                        <p data-testid="test-todo-tag-urgent" class="content-icon-test ">urgent</p>
                        <div class="test-todo-symbol urgency-1"></div>
                    </span>

                </div>

                <div data-testid="test-todo-tags" class="edit-delete  test-todo-tag">
                    <p data-testid="test-todo-edit-button" class="content-edit">Edit</p>

                    <span data-testid="test-todo-delete-button" class="  content-urgent">
                        <p class="content-icon-test">delete</p><svg xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="content-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                        </svg>
                    </span>

                </div>

            </div>





            <div class="section-1-write-up section-1-write-up-2  ">

                <div class="documented-task">
                    <label data-testid="test-todo-complete-toggle">
                        <input role="checkbox" type="checkbox" data-testid="test-todo-complete-toggle">
                        finish assignment
                    </label>

                    <div class="task-date" data-testid="test-todo-description-time">
                        <div class="task-duedate">
                            <p>finish my math assignment</p>
                            <span data-testid="test-todo-due-date">2026-04-16</span>
                        </div>

                        <p data-testid="test-todo-time-remaining" class="time-remaing">3 days time</p>
                    </div>


                    <div class="priority-level">
                        <div>🔥</div>
                        <span data-testid="test-todo-priority" class="priority-high">high</span>
                    </div>

                </div>

                <p data-testid="test-todo-status" data-original='#inprogress...' class=" test test-pending">
                    #inprogress...</p>

                <div data-testid="test-todo-tags" class="tags-category test-todo-tag ">


                    <p data-testid="test-todo-tag-work" class="content-edit">school</p>

                    <span class="content-urgent">
                        <p data-testid="test-todo-tag-urgent" class="content-icon-test ">urgent</p>
                        <div class="test-todo-symbol urgency-2"></div>
                    </span>

                </div>

                <div data-testid="test-todo-tags" class="edit-delete  test-todo-tag">
                    <p data-testid="test-todo-edit-button" class="content-edit">Edit</p>

                    <span data-testid="test-todo-delete-button" class="content-urgent">
                        <p class="content-icon-test">delete</p><svg xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="content-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                        </svg>
                    </span>

                </div>

            </div>



        </section>



        <section class="section-2">
            <h2 data-testid="test-todo-tittle">
                Build To-Do List
            </h2>
            <h2> HNG Internship </h2>
            <p class="section-2-p">
                javacript
            </p>

        </section>


    </article>
</body>

</html>
